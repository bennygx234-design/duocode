services:
  - type: web
    name: duocode-server
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://duocode-app.vercel.app
      - key: DATABASE_PATH
        value: /data/duocode.db
    disk:
      name: duocode-db
      mountPath: /data
      sizeGB: 1
